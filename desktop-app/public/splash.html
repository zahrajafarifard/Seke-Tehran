<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Splash Screen</title>
    <style>
      body {
        background-color: #1e1e1e;
        font-family: Arial, Helvetica, sans-serif;
        text-align: center;
        border-radius: 50%;
      }
      .telmis {
        color: rgb(172, 11, 11);
        font-size: 28px;
        font-weight: bolder;
      }

      .footer {
        color: gray;
        font-size: 24px;
        position: fixed;
        bottom: 25px;
        width: 100%;
        margin: 0 auto;
        font-weight: bolder;
      }
      .spinner {
        border-top-color: rgb(172, 11, 11);
        border-left-color: rgb(172, 11, 11);
        border-style: solid;
        border-width: 8px;
        animation: spin 1s linear infinite;
        width: 50px;
        height: 50px;
        position: absolute;
        border-radius: 50%;
        top: calc(50% - 25px);
        left: calc(50% - 25px);
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      h1 {
        font-size: 2.2em;
        margin-top: 15%;
        color: rgb(146, 130, 130);
      }
    </style>
  </head>
  <body>
    <h1>... در حال بارگزاری</h1>

    <div class="spinner"></div>

    <div class="footer">
      شرکت داده پردازان <span class="telmis"> تلمیس</span>
    </div>
  </body>
</html>
